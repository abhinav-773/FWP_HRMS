databases:
  # Primary SQL Database
  - name: hrms-postgres
    plan: free

services:
  # Redis Cache for caching and socket pub/sub
  - type: redis
    name: hrms-redis
    plan: free
    ipAllowList: []
    
  # Node.js Backend API
  - type: web
    name: hrms-backend
    env: node
    buildCommand: "cd backend && npm install && npm run build"
    startCommand: "cd backend && npm run start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: hrms-redis
          property: connectionString
      - key: PORT
        value: "5000"
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      # Important: You must replace this in the Render dashboard after deployment
      - key: MONGODB_URI
        value: "mongodb+srv://<user>:<password>@cluster0.mongodb.net/?retryWrites=true&w=majority"
      # This will be updated automatically by Render once AI service is deployed
      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: hrms-ai-service
          property: host

  # Python AI Service
  - type: web
    name: hrms-ai-service
    env: python
    buildCommand: "cd ai-service && pip install -r requirements.txt"
    startCommand: "cd ai-service && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PORT
        value: "10000"
      - key: PYTHON_VERSION
        value: "3.10.0"
      # Add OpenAI API key or other LLM keys here if needed
      - key: OPENAI_API_KEY
        value: "your_openai_api_key_here"
