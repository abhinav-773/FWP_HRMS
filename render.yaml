databases:
  # Primary SQL Database
  - name: hrms-postgres
    plan: free

services:
  # Redis Cache for caching and socket pub/sub
  - type: redis
    name: hrms-redis
    plan: free
    ipAllowList: []
    
  # Node.js Backend API
  - type: web
    name: hrms-backend
    plan: free
    env: node
    rootDir: backend
    buildCommand: "npm install && npm install tsx && npx prisma generate"
    startCommand: "npx tsx src/index.ts"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: hrms-redis
          property: connectionString
      - key: PORT
        value: "5000"
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      # Important: You must replace this in the Render dashboard after deployment
      - key: MONGODB_URI
        value: "mongodb+srv://<user>:<password>@cluster0.mongodb.net/?retryWrites=true&w=majority"
      - key: GEMINI_API_KEY
        value: "your_gemini_api_key_here"
      - key: GROQ_API_KEY
        value: "your_groq_api_key_here"
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: "https://fwp-hrms.vercel.app"

