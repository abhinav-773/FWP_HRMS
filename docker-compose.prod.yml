version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: hrgpt-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - ai-service
    restart: unless-stopped
    networks:
      - hrgpt_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hrgpt-frontend
    restart: unless-stopped
    networks:
      - hrgpt_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrgpt-backend
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://admin:password@postgres:5432/hrgpt_db?schema=public
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/hrgpt_chat?authSource=admin
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - NODE_ENV=production
    depends_on:
      - postgres
      - mongodb
      - redis
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped
    networks:
      - hrgpt_net

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: hrgpt-ai-service
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    restart: unless-stopped
    networks:
      - hrgpt_net
    # If running locally on Linux with Nvidia GPU, uncomment below:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  postgres:
    image: postgres:15-alpine
    container_name: hrgpt-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hrgpt_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - hrgpt_net

  mongodb:
    image: mongo:6-jammy
    container_name: hrgpt-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - hrgpt_net

  redis:
    image: redis:7-alpine
    container_name: hrgpt-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - hrgpt_net

volumes:
  postgres_data:
  mongo_data:
  redis_data:

networks:
  hrgpt_net:
    driver: bridge
